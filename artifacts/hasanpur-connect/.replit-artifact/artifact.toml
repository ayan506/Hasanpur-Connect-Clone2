kind = "web"
previewPath = "/"
title = "Hasanpur Connect"
version = "1.0.0"
id = "artifacts/hasanpur-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22159

[services.development]
run = "pnpm --filter @workspace/hasanpur-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hasanpur-connect", "run", "build" ]
publicDir = "artifacts/hasanpur-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22159"
BASE_PATH = "/"
